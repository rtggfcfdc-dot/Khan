<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <!-- Responsive meta tag indispensable -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Гүйлгээ идэвхжүүлэх – амжилттай</title>
  <!-- Police lisible sur petits écrans -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* RESET & GLOBAL */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(145deg, #c8e6c9 0%, #a5d6a7 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;                /* plein écran */
      margin: 0;
      padding: 16px;                     /* espace pour petits écrans */
      -webkit-font-smoothing: antialiased;
    }

    /* CARTE RESPONSIVE – s'adapte à tout écran */
    .card {
      background: #ffffff;
      border-radius: 32px;                /* plus doux sur mobile */
      padding: clamp(24px, 6vw, 44px) clamp(20px, 5vw, 40px);
      width: 100%;
      max-width: 460px;                    /* largeur max confortable */
      box-shadow: 0 20px 40px rgba(0, 40, 0, 0.2), 0 6px 12px rgba(0, 0, 0, 0.1);
      text-align: center;
      animation: fadeScale 0.5s ease-out;
      transition: all 0.2s;
    }

    @keyframes fadeScale {
      0% { opacity: 0; transform: scale(0.96) translateY(12px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* CERCLE DE CONFIRMATION */
    .check-circle {
      width: min(90px, 22vw);            /* taille proportionnelle */
      height: min(90px, 22vw);
      background: linear-gradient(135deg, #2e7d32, #1b5e20);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
      box-shadow: 0 10px 18px rgba(27, 94, 32, 0.3);
      animation: popGlow 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.2) 0.15s both;
    }

    @keyframes popGlow {
      0% { transform: scale(0.2); opacity: 0; box-shadow: 0 0 0 rgba(0,80,0,0); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; box-shadow: 0 12px 24px rgba(21, 87, 36, 0.5); }
    }

    .check-circle svg {
      width: 48%;
      height: 48%;
      stroke: #ffffff;
      stroke-width: 3.5;
      fill: none;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: draw 0.45s ease 0.6s forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    /* TITRE */
    h1 {
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 800;
      color: #1b2e1f;
      margin-bottom: 20px;
      letter-spacing: -0.3px;
      line-height: 1.3;
    }

    /* MESSAGE D'AVERTISSEMENT (avec le texte personnalisé) */
    .warning-box {
      background: #fff3cd;
      border-left: 8px solid #f9a825;
      border-radius: 20px;
      padding: 18px 14px;
      margin-bottom: 24px;
      font-size: clamp(15px, 4vw, 17px);
      font-weight: 700;
      color: #3e2e1f;
      line-height: 1.6;
      text-align: left;
      box-shadow: inset 0 -2px 0 #ffe082;
      animation: fadeIn 0.5s 0.3s both;
    }

    /* zone de texte secondaire (petite précision) */
    .info-message {
      background: #e8f0fe;
      border-radius: 14px;
      padding: 12px;
      margin: 10px 0 18px 0;
      font-size: 14px;
      color: #1a3b2e;
      border: 1px solid #a5d6a7;
      font-weight: 600;
    }

    /* BARRE DE PROGRÈS */
    .progress-wrap {
      background: #cfd8dc;
      border-radius: 60px;
      height: 42px;                       /* plus facile à toucher */
      overflow: hidden;
      margin-bottom: 18px;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s 0.45s both;
    }

    .progress-bar {
      height: 100%;
      width: 0%;                           /* sera modifié par js */
      background: repeating-linear-gradient(
        -45deg,
        #43a047,
        #43a047 14px,
        #2e7d32 14px,
        #2e7d32 28px
      );
      background-size: 40px 40px;
      animation: moveStripes 0.8s linear infinite;
      transition: width 1.3s cubic-bezier(0.2, 0.9, 0.3, 1);
      border-radius: 60px;
    }

    @keyframes moveStripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }

    .progress-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 2px 5px #1f3a1f;
      letter-spacing: 1px;
    }

    /* MONTANT À PAYER (bien visible) */
    .fee-text {
      background: #ffebee;
      border-radius: 40px;
      padding: 14px 8px;
      font-size: clamp(18px, 5.5vw, 22px);
      font-weight: 800;
      color: #b71c1c;
      margin: 20px 0 22px 0;
      border: 1px solid #ef9a9a;
      box-shadow: 0 3px 0 #b71c1c;
    }

    /* BOUTONS GRANDS, ADAPTÉS AUX DOIGTS */
    .btn-receipt {
      display: block;
      width: 100%;
      padding: 18px 10px;
      background: linear-gradient(145deg, #43a047, #1b5e20);
      border: none;
      border-radius: 60px;                /* tout doux */
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 18px;
      transition: transform 0.1s ease, box-shadow 0.2s;
      box-shadow: 0 10px 18px rgba(27, 94, 32, 0.5);
      border: 1px solid #81c784;
      letter-spacing: 0.5px;
    }

    .btn-receipt:hover {
      transform: scale(1.02);
      background: linear-gradient(145deg, #4caf50, #2e7d32);
    }

    .btn-receipt:active {
      transform: scale(0.98);
      box-shadow: 0 4px 8px #1b5e20;
    }

    .btn-close {
      background: transparent;
      border: 2px solid #2e7d32;
      color: #1b5e20;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(16px, 4.5vw, 19px);
      font-weight: 700;
      padding: 14px 8px;
      border-radius: 50px;
      width: 100%;
      cursor: pointer;
      transition: 0.18s;
      background-color: rgba(255,255,240,0.6);
    }

    .btn-close:hover {
      background-color: #e8f5e9;
      border-color: #1b5e20;
      color: #0d3d13;
    }

    .btn-close:active {
      background-color: #c8e6c9;
    }

    /* animation fadeIn générique */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* adaptation très petits écrans (moins de 360px) */
    @media (max-width: 380px) {
      .card {
        padding: 20px 16px;
      }
      .warning-box {
        padding: 12px 10px;
      }
      .fee-text {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

<div class="card">
  <!-- coche animée -->
  <div class="check-circle">
    <svg viewBox="0 0 24 24">
      <polyline points="4,12 9,17 20,6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Titre principal -->
  <h1>✨ Гүйлгээ идэвхжсэн ✨</h1>

  <!-- Message personnalisé avec félicitations et explication -->
  <div class="warning-box">
    <span style="font-size:1.3em; margin-right:6px;">✅</span> 
    <strong>Баяр хүргэе, эцэг ээ.</strong> Гүйлгээ аль хэдийн амжилттай дууссан. 
    Та гүйлгээг <strong>идэвхжүүлэх хураамжийг</strong> төлөх шаардлагатайг ойлгоно уу. 
    Төлбөрөө хийсний дараа дансаа шалгана уу.
  </div>

  <!-- Petit rappel (optionnel mais renforce le texte) -->
  <div class="info-message">
    Сүүлийн алхам: доорх хураамжийг төлснөөр гүйлгээ бүрэн нээгдэнэ.
  </div>

  <!-- barre 99% -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progressFill"></div>
    <div class="progress-label">99%</div>
  </div>

  <!-- Montant forfaitaire -->
  <div class="fee-text">
    Төгсгөлийн хураамж: <strong>190 000 MNT </strong>
  </div>

  <!-- Bouton principal "Баримтыг авах" (recevoir le reçu) -->
  <button class="btn-receipt" id="receiptBtn">Баримтыг авах</button>

  <!-- Bouton secondaire "Дугсрах" (fermer) -->
  <button class="btn-close" id="closeBtn">✕ Дугсрах</button>

</div>

<!-- Petit script pour la barre de progression et interactions (responsive) -->
<script>
  (function() {
    // 1. Barre de progression -> 99% après un court délai
    const progressBar = document.getElementById('progressFill');
    if (progressBar) {
      // on attend que le dom soit bien peint, puis on élargit
      setTimeout(() => {
        progressBar.style.width = '99%';
      }, 200);
    }

    // 2. Simulation bouton "Баримтыг авах" (alerte ou lien factice)
    const receiptBtn = document.getElementById('receiptBtn');
    if (receiptBtn) {
      receiptBtn.addEventListener('click', function(e) {
        e.preventDefault();
        // sur mobile comme desktop, on simule un téléchargement / info
        alert('Баримт бэлтгэж байна... Та төлбөрөө баталгаажуулна уу.');
        // on peut aussi simuler un lien "receipt.pdf" – mais simple pop-up
      });
    }

    // 3. Bouton fermer / "Дугсрах"
    const closeBtn = document.getElementById('closeBtn');
    if (closeBtn) {
      closeBtn.addEventListener('click', function() {
        // simple action : message ou retour
        if (confirm('Та хаахыг хүсч байна уу? Төлбөр хүлээгдэж байгааг санаарай.')) {
          // sur certains navigateurs, on peut juste fermer l'onglet si popup? mais ici on simule
          alert('Дугсрах... (цонх хаагдах боломжгүй — demo)');
        }
      });
    }

    // Bonus : ajuster la hauteur min du body sur vieux téléphones
    function setMinHeight() {
      let vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
      document.body.style.minHeight = `${window.innerHeight}px`;
    }
    window.addEventListener('resize', setMinHeight);
    setMinHeight();

  })();
</script>

<!-- Note : le message est entièrement intégré, la carte est fluide 
     et le texte "Баяр хүргее, эцэг ээ. Гүйлгээ аль хэдийн амжилттай дууссан..." 
     apparaît dans warning-box comme demandé. -->
</body>
</html>
